<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dodge da Chuva ⛈️</title>
<style>
    body {
        margin: 0;
        background: #0a0a1f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }
    canvas {
        border: 3px solid #555;
        image-rendering: pixelated;
    }
    #gameOver {
        position: absolute;
        color: white;
        font-size: 50px;
        display: none;
        text-align: center;
    }
    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 24px;
    }
</style>
</head>
<body>

<div id="score">Pontos: <span id="points">0</span></div>
<canvas id="game" width="600" height="600"></canvas>

<div id="gameOver">
    <h1>Game Over ☠️</h1>
    <p>Pontos: <span id="finalScore">0</span></p>
    <button onclick="restart()">Jogar Novamente</button>
</div>

<script>
// =============== CONFIGURAÇÃO ===============
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("points");
const gameOverScreen = document.getElementById("gameOver");
const finalScoreElement = document.getElementById("finalScore");

let player = { x: 280, y: 500, width: 40, height: 60, speed: 8 };
let rain = [];
let lightning = [];
let score = 0;
let gameRunning = true;
let thunderTimer = 0;
let difficulty = 1;

// =============== CONTROLES ===============
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// =============== FUNÇÕES ===============
function spawnRain() {
    rain.push({
        x: Math.random() * canvas.width,
        y: -10,
        length: 15 + Math.random() * 15,
        speed: 8 + Math.random() * 7
    });
}

function spawnLightning() {
    lightning.push({
        x: Math.random() * (canvas.width - 40),
        y: -100,
        width: 40,
        height: 600,
        life: 25, // frames visível
        flash: true
    });
}

function drawBackground() {
    // Céu escuro com chuva
    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Nuvens
    ctx.fillStyle = "#333355";
    ctx.fillRect(50, 80, 200, 60);
    ctx.fillRect(350, 50, 180, 70);
}

// Desenhar jogador (pessoa simples)
function drawPlayer() {
    ctx.fillStyle = "#4ade80";
    ctx.fillRect(player.x, player.y, player.width, player.height); // corpo
    
    // cabeça
    ctx.fillStyle = "#facc15";
    ctx.beginPath();
    ctx.arc(player.x + 20, player.y + 15, 12, 0, Math.PI * 2);
    ctx.fill();
}

// Desenhar chuva
function drawRain() {
    ctx.strokeStyle = "#60a5fa";
    ctx.lineWidth = 2;
    for (let drop of rain) {
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x, drop.y + drop.length);
        ctx.stroke();
    }
}

// Desenhar trovão / raio
function drawLightning() {
    for (let bolt of lightning) {
        if (bolt.flash) {
            ctx.fillStyle = "rgba(255, 255, 200, 0.9)";
            ctx.fillRect(bolt.x, 0, bolt.width, canvas.height);
            
            // brilho extra
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.fillRect(bolt.x - 15, 0, bolt.width + 30, canvas.height);
        }
    }
}

function update() {
    if (!gameRunning) return;

    // Movimento do jogador
    if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
    if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;

    // Limites da tela
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    // Chuva
    for (let i = rain.length - 1; i >= 0; i--) {
        rain[i].y += rain[i].speed;
        if (rain[i].y > canvas.height) rain.splice(i, 1);
    }

    // Trovões (ficam mais frequentes com o tempo)
    thunderTimer++;
    if (thunderTimer > 90 - difficulty * 10) {
        if (Math.random() < 0.4) spawnLightning();
        thunderTimer = 0;
    }

    // Atualizar trovões
    for (let i = lightning.length - 1; i >= 0; i--) {
        lightning[i].life--;
        if (lightning[i].life <= 0) lightning.splice(i, 1);
    }

    // Colisão com trovão
    for (let bolt of lightning) {
        if (bolt.life > 10) { // só colide enquanto está brilhando forte
            if (
                player.x < bolt.x + bolt.width &&
                player.x + player.width > bolt.x &&
                player.y < bolt.y + bolt.height &&
                player.y + player.height > bolt.y
            ) {
                gameOver();
            }
        }
    }

    // Aumentar dificuldade
    if (score % 300 === 0 && score > 0) difficulty += 0.3;

    score++;
    scoreElement.textContent = score;
}

function gameLoop() {
    drawBackground();
    drawRain();
    drawLightning();
    drawPlayer();
    update();

    // Spawn chuva constante
    if (Math.random() < 0.7) spawnRain();
    if (Math.random() < 0.4) spawnRain(); // mais chuva

    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    finalScoreElement.textContent = score;
    gameOverScreen.style.display = "block";
}

function restart() {
    rain = [];
    lightning = [];
    player.x = 280;
    score = 0;
    difficulty = 1;
    thunderTimer = 0;
    gameRunning = true;
    gameOverScreen.style.display = "none";
    scoreElement.textContent = "0";
}

// Iniciar jogo
spawnRain();
gameLoop();
</script>

</body>
</html>
